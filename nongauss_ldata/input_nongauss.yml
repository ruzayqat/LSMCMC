# input_nongauss.yml
# ===================
# Configuration for the 3-layer MLSWE model with localized LSMCMC (V2)
# and **non-Gaussian observation noise** (ε-contaminated Gaussian mixture).
#
# Identical to example_input_mlswe_ldata_V2.yml except for:
#   - obs_noise_weights / obs_noise_scales (mixture obs-noise parameters)
#   - lsmcmc_dir (output directory)
#
# Observation noise model:
#   V_t ~ (1-ε) N(0, R) + ε N(0, c²·R)
#   Default:  ε=0.2,  c=5    (20% outliers with 5× inflated noise)
#
# The posterior is still a Gaussian mixture (J × N_f components)
# and can be sampled directly.

# ---- Parallel execution ----
ncores: 50
M: 1
workers: 50

# ---- Time stepping ----
T: 11520
dt: 75.0
t_freq: 48
assim_timesteps: 48
nassim: 240

# ---- Grid ----
dgx: 80
dgy: 70
lon_min: -60.0
lon_max: -20.0
lat_min: 10.0
lat_max: 45.0

# ---- Multi-layer model parameters ----
precision: 'double'
g: 9.81
H_mean: 4000.0
rho: [1023.0, 1026.0, 1028.0]
H_rest: [100.0, 400.0, 3500.0]
T_rest: [298.15, 283.15, 275.15]
bottom_drag: 1.0e-6
sst_nudging_rate: 0.000278
sst_nudging_ref_source: 'hycom'
ssh_relax_rate: 9.3e-5
ssh_analysis_relax_frac: 0.0
sst_flux_type: 'newtonian'
sst_alpha: 100.0
sst_h_mix: 0.1
diff_coeff: 500.0
diff_order: 1
tracer_diff: 100.0
geostrophic_blend: 0.0

# ---- Bathymetry ----
bathymetry_file: null
download_bathymetry: True
H_min: 500.0
bathy_r_max: 0.2

# ---- Island / shallow-water damping ----
shallow_drag_depth: 800.0
shallow_drag_coeff: 5.0e-4

# ---- Boundary conditions ----
bc_file: ./data/hycom_bc_2024aug.nc
alpha_h: [0.6, 0.3, 0.1]
beta_vel: [1.0, 1.0, 1.0]
bc_n_ghost: 2
sponge_width: 8
sponge_timescale: 3600.0

# ---- Process noise ----
sig_x_uv: 0.15
sig_x_ssh: 0.2
sig_x_sst: 1.0
noise_decay: [1.0, 0.01, 0.01]

# ---- Observations ----
drifter_source: 'osmc'
obs_time_start: '2024-08-01T00:00:00'
obs_time_end: '2024-08-12T00:00:00'
assimilate_fields: 'uv_ssh_sst'

# Base observation noise (σ_y), multiplied by obs_noise_scales below
sig_y_uv: 0.10
sig_y_sst: 0.40
sig_y_ssh: 0.25

# ---- NON-GAUSSIAN observation noise (ε-contaminated Gaussian mixture) ----
# g(y|z) = Σ_j  α_j  N(y; Hz, s_j² · R)
#
# obs_noise_weights:  mixture weights [α_1, ..., α_J]  (must sum to 1)
# obs_noise_scales:   noise scale factors [s_1, ..., s_J]
#
# Default: 2-component ε-contamination with ε=0.2, scale=5
#   => 80% "clean" obs at base noise, 20% "outlier" obs at 5× noise
obs_noise_weights: [0.8, 0.2]
obs_noise_scales:  [1.0, 5.0]

# ---- Localized LSMCMC (V2) parameters ----
nforecast: 25
mcmc_N: 500
burn_in: 500
num_subdomains: 1400

r_loc: 2.5
rtps_alpha: 0.5
reset_interval: 100
n_block_workers: 104

# ---- LETKF parameters (if also running LETKF for comparison) ----
nanals: 25
hcovlocal_scale: 200
covinflate1: 0.95

# ---- Output ----
lsmcmc_dir: ./output_lsmcmc_nongauss
letkf_dir: ./output_letkf
data_dir: ./data

# ---- Observation file ----
obs_file: ./data/obs_2024aug/swe_drifter_obs.nc

# ---- SWOT SSH observations ----
use_swot_ssh: True
swot_source: 'real'
swot_dir: ./data/swot_2024aug_new
ssha_max: null
ssh_obs_fraction: 0.15
ssh_obs_seed: 42
