# input_nongauss_twin_v2.yml
# ===========================
# Non-Gaussian twin experiment — NonGaussianFilter V2 (correct mixture model).
#
# Uses the SAME nature run + synthetic obs as V1 (from output_nongauss_twin_V1/).
# The NonGaussianFilter knows the correct 3-component mixture likelihood
# and samples the J × N_f posterior directly (no MCMC).

# ---- Parallel execution ----
ncores: 50
nsimu: 1
workers: 50

# ---- Time stepping ----
T: 11520
dt: 75.0
t_freq: 48
assim_timesteps: 48
nassim: 240

# ---- Grid ----
dgx: 80
dgy: 70
lon_min: -60.0
lon_max: -20.0
lat_min: 10.0
lat_max: 45.0

# ---- Multi-layer model parameters ----
precision: 'double'
g: 9.81
H_mean: 4000.0
rho: [1023.0, 1026.0, 1028.0]
H_rest: [100.0, 400.0, 3500.0]
T_rest: [298.15, 283.15, 275.15]
bottom_drag: 1.0e-6
sst_nudging_rate: 0.000278
sst_nudging_ref_source: 'hycom'
ssh_relax_rate: 9.3e-5
ssh_analysis_relax_frac: 0.0
sst_flux_type: 'newtonian'
sst_alpha: 100.0
sst_h_mix: 0.1
diff_coeff: 500.0
diff_order: 1
tracer_diff: 100.0
geostrophic_blend: 0.0

# ---- Bathymetry ----
bathymetry_file: null
download_bathymetry: True
H_min: 500.0
bathy_r_max: 0.2

# ---- Island / shallow-water damping ----
shallow_drag_depth: 800.0
shallow_drag_coeff: 5.0e-4

# ---- Boundary conditions ----
bc_file: ./data/hycom_bc_2024aug.nc
alpha_h: [0.6, 0.3, 0.1]
beta_vel: [1.0, 1.0, 1.0]
bc_n_ghost: 2
sponge_width: 8
sponge_timescale: 3600.0

# ---- Process noise ----
sig_x_uv: 0.15
sig_x_ssh: 0.2
sig_x_sst: 1.0
noise_decay: [1.0, 0.01, 0.01]

# ---- Observations ----
drifter_source: 'osmc'
obs_time_start: '2024-08-01T00:00:00'
obs_time_end: '2024-08-12T00:00:00'
assimilate_fields: 'uv_ssh_sst'

# Base observation noise
sig_y_uv: 0.10
sig_y_sst: 0.40
sig_y_ssh: 0.25

# ---- NON-GAUSSIAN mixture parameters (MUST match obs generation) ----
obs_noise_weights: [0.7, 0.2, 0.1]
obs_noise_scales:  [1.0, 3.0, 10.0]

# ---- Localized LSMCMC V2 (NonGaussianFilter) parameters ----
nforecast: 25
mcmc_N: 500
burn_in: 500
num_subdomains: 1400

r_loc: 2.5
rtps_alpha: 0.5
reset_interval: 100
n_block_workers: 104

# ---- Output ----
lsmcmc_dir: ./output_nongauss_twin_V2
data_dir: ./data

# ---- Source observation file (for locations only) ----
obs_file: ./data/obs_2024aug/swe_drifter_obs.nc

# ---- SWOT SSH observations ----
use_swot_ssh: True
swot_source: 'real'
swot_dir: ./data/swot_2024aug_new
ssh_obs_fraction: 0.15
ssh_obs_seed: 42

# ---- Linear case merged obs (for SSH obs locations) ----
linear_merged_obs: ./output_lsmcmc_ldata_V1/mlswe_merged_obs.nc

# ---- Twin experiment seed ----
twin_rng_seed: 42
