# input_nongauss_twin.yml
# ========================
# Non-Gaussian twin experiment — LSMCMC V1 (Gaussian assumption).
#
# 1. Generate nature run + synthetic obs with 3-component Gaussian mixture noise
# 2. Run LSMCMC V1 (partition-based, Gaussian assumption → misspecified)
# 3. Compute RMSE against nature run
#
# Observation noise model:
#   ε ~ 0.7 N(0, σ²_y) + 0.2 N(0, 9σ²_y) + 0.1 N(0, 100σ²_y)
#   (70% clean, 20% moderate outliers at 3×noise, 10% severe at 10×noise)

# ---- Parallel execution ----
ncores: 50
nsimu: 1

# ---- Time stepping ----
T: 11520
dt: 75.0
t_freq: 48
assim_timesteps: 48
nassim: 240

# ---- Grid ----
dgx: 80
dgy: 70
lon_min: -60.0
lon_max: -20.0
lat_min: 10.0
lat_max: 45.0

# ---- Multi-layer model parameters ----
precision: 'double'
g: 9.81
H_mean: 4000.0
rho: [1023.0, 1026.0, 1028.0]
H_rest: [100.0, 400.0, 3500.0]
T_rest: [298.15, 283.15, 275.15]
bottom_drag: 1.0e-6

# SST nudging
sst_nudging_rate: 0.000278
sst_nudging_ref_source: 'hycom'

# SSH relaxation
ssh_relax_rate: 9.3e-5
ssh_analysis_relax_frac: 0.0

# Surface heat flux
sst_flux_type: 'newtonian'
sst_alpha: 100.0
sst_h_mix: 0.1

# Diffusion
diff_coeff: 500.0
diff_order: 1
tracer_diff: 100.0
geostrophic_blend: 0.0

# ---- Bathymetry ----
bathymetry_file: null
download_bathymetry: True
H_min: 500.0
bathy_r_max: 0.2

# ---- Island / shallow-water damping ----
shallow_drag_depth: 800.0
shallow_drag_coeff: 5.0e-4

# ---- Boundary conditions ----
bc_file: ./data/hycom_bc_2024aug.nc
alpha_h: [0.6, 0.3, 0.1]
beta_vel: [1.0, 1.0, 1.0]
bc_n_ghost: 2
sponge_width: 8
sponge_timescale: 3600.0

# ---- Process noise ----
sig_x_uv: 0.15
sig_x_ssh: 0.2
sig_x_sst: 1.0
noise_decay: [1.0, 0.01, 0.01]

# ---- Observations ----
drifter_source: 'osmc'
obs_time_start: '2024-08-01T00:00:00'
obs_time_end: '2024-08-12T00:00:00'
assimilate_fields: 'uv_ssh_sst'

# Base observation noise (σ_y)
sig_y_uv: 0.10
sig_y_sst: 0.40
sig_y_ssh: 0.25

# ---- NON-GAUSSIAN noise parameters (for obs generation) ----
obs_noise_weights: [0.7, 0.2, 0.1]
obs_noise_scales:  [1.0, 3.0, 10.0]

# ---- LSMCMC V1 parameters ----
nforecast: 25
mcmc_N: 500
burn_in: 500
num_subdomains: 1400

# ---- Output ----
lsmcmc_dir: ./output_nongauss_twin_V1
data_dir: ./data

# ---- Source observation file (for locations only) ----
obs_file: ./data/obs_2024aug/swe_drifter_obs.nc

# ---- SWOT SSH observations ----
use_swot_ssh: True
swot_source: 'real'
swot_dir: ./data/swot_2024aug_new
ssh_obs_fraction: 0.15
ssh_obs_seed: 42

# ---- Linear case merged obs (for SSH obs locations) ----
linear_merged_obs: ./output_lsmcmc_ldata_V1/mlswe_merged_obs.nc

# ---- Twin experiment seed ----
twin_rng_seed: 42
