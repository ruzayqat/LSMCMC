# input_nlgamma_twin_hmc.yml
# ==========================
# NL twin experiment — V1 with HMC kernel.
#
# Same as input_nlgamma_twin.yml but uses HMC instead of pCN,
# with burn_in=200, N_a=300.  Results saved to output_nlgamma_twin_V1_hmc.

# ---- Parallel execution ----
ncores: 50
nsimu: 1

# ---- Time stepping ----
T: 11520
dt: 75.0
t_freq: 48
assim_timesteps: 48
nassim: 240

# ---- Grid ----
dgx: 80
dgy: 70
lon_min: -60.0
lon_max: -20.0
lat_min: 10.0
lat_max: 45.0

# ---- Multi-layer model parameters ----
precision: 'double'
g: 9.81
H_mean: 4000.0
rho: [1023.0, 1026.0, 1028.0]
H_rest: [100.0, 400.0, 3500.0]
T_rest: [298.15, 283.15, 275.15]
bottom_drag: 1.0e-6
sst_nudging_rate: 0.000278
sst_nudging_ref_source: 'hycom'
ssh_relax_rate: 9.3e-5
ssh_relax_interior_floor: 0.10
ssh_analysis_relax_frac: 0.0
sst_flux_type: 'newtonian'
sst_alpha: 100.0
sst_h_mix: 0.1
diff_coeff: 500.0
diff_order: 1
tracer_diff: 100.0

# ---- Bathymetry ----
bathymetry_file: null
download_bathymetry: True
H_min: 500.0
bathy_r_max: 0.2

# ---- Island / shallow-water damping ----
shallow_drag_depth: 800.0
shallow_drag_coeff: 5.0e-4

# ---- Boundary conditions ----
bc_file: ./data/hycom_bc_2024aug.nc
alpha_h: [0.6, 0.3, 0.1]
beta_vel: [1.0, 1.0, 1.0]
bc_n_ghost: 2
sponge_width: 8
sponge_timescale: 3600.0
geostrophic_blend: 0.5

# ---- Process noise (Gaussian) ----
sig_x_uv: 0.15
sig_x_ssh: 0.5
sig_x_sst: 1.0
noise_decay: [1.0, 0.01, 0.01]

# ---- Observation noise ----
sig_y_uv: 0.05
sig_y_sst: 0.05
sig_y_ssh: 0.05

# ---- Student-t noise parameters (for obs generation) ----
student_t_nu: 1.0

# ---- Observations ----
assimilate_fields: 'uv_ssh_sst'
obs_file: ./data/obs_2024aug/swe_drifter_obs.nc
obs_time_start: '2024-08-01T00:00:00'
obs_time_end: '2024-08-12T00:00:00'
linear_merged_obs: ./output_lsmcmc_ldata_V1/mlswe_merged_obs.nc

# ---- LSMCMC V1 parameters ----
nforecast: 25
mcmc_N: 300
burn_in: 200
num_subdomains: 50

# MCMC tuning — HMC kernel
mcmc_kernel: 'hmc'
mcmc_chains: 10
mcmc_step_size: 0.01
mcmc_adapt: true
mcmc_adapt_interval: 50
mcmc_target_acc: 0.65
mcmc_thin: 1
pcn_beta: 0.10
hmc_leapfrog_steps: 10

# ---- Output ----
lsmcmc_dir: ./output_nlgamma_twin_V1_hmc
data_dir: ./data
