# example_input_mlswe.yml
# =======================
# Configuration for the 3-layer MLSWE model with LSMCMC + LETKF
# on the same North Atlantic domain as SWE_LSMCMC.
#
# 3-layer primitive equations (Boussinesq, hydrostatic):
#   Layer 0 (surface / mixed layer):  ρ₀ = 1023 kg/m³,  H_rest = 100 m
#   Layer 1 (thermocline):            ρ₁ = 1026 kg/m³,  H_rest = 400 m
#   Layer 2 (deep):                   ρ₂ = 1028 kg/m³,  H_rest = 3500 m

# ---- Parallel execution ----
ncores: 50
nsimu: 1

# ---- Time stepping ----
# Same CFL as single-layer (barotropic mode dominates):
# dt=75s, t_freq=48 → assimilate every 3600 s = 1 hour
T: 11520            # 240 cycles × 48 steps/cycle ≈ 10 days
dt: 75.0
t_freq: 48
assim_timesteps: 48
nassim: 240         # full 240-cycle run

# ---- Grid ----
dgx: 80
dgy: 70
lon_min: -60.0
lon_max: -20.0
lat_min: 10.0
lat_max: 45.0

# ---- Multi-layer model parameters ----
precision: 'double'
g: 9.81
H_mean: 4000.0

# Layer densities (kg/m³), surface → deep
rho: [1023.0, 1026.0, 1028.0]

# Rest-state layer thicknesses (m)
# Must sum to approximately H_mean
H_rest: [100.0, 400.0, 3500.0]

# Rest-state layer temperatures (K)
# Surface: ~25°C, thermocline: ~10°C, deep: ~2°C
T_rest: [298.15, 283.15, 275.15]

# Bottom drag (only applied to bottom layer)
bottom_drag: 1.0e-6

# SST nudging (Newtonian relaxation of layer-0 T toward HYCOM reference)
sst_nudging_rate: 0.000278     # lambda = 1/3600 s^-1 -> tau = 1 hour
sst_nudging_ref_source: 'hycom'

# SSH relaxation (Newtonian relaxation of h_total toward H_b + eta_HYCOM)
# Modulated by sponge mask: full rate at boundaries, 10% in interior.
# tau ≈ 3 hours at boundaries, ~30 hours in interior.
ssh_relax_rate: 9.3e-5
# Floor for interior SSH relaxation (fraction of boundary rate)
# 0.1 = interior gets 10% of boundary relaxation (prevents unbounded drift)
ssh_relax_interior_floor: 0.10
# Fraction of SSH anomaly removed at each analysis step (post-DA correction)
# Mild correction: remove 10% of SSH deviation from HYCOM after each cycle.
ssh_analysis_relax_frac: 0.10

# Surface heat flux (Newtonian cooling: Q = -alpha * (T - T_air))
# Matches SWE_LSMCMC configuration for fair comparison.
sst_flux_type: 'newtonian'
sst_alpha: 100.0               # W/(m2.K)  bulk transfer coefficient
sst_h_mix: 0.1                 # mixed-layer depth (m) for flux -> tendency

# Diffusion
diff_coeff: 1000.0       # increased: smoother SSH gradients, reduces grid noise
diff_order: 1
tracer_diff: 100.0

# ---- Bathymetry ----
bathymetry_file: null        # auto-detected from data/
download_bathymetry: True
H_min: 500.0
bathy_r_max: 0.2

# ---- Island / shallow-water damping ----
shallow_drag_depth: 800.0
shallow_drag_coeff: 5.0e-4

# ---- Boundary conditions ----
# HYCOM BC applied to all 3 layers:
#   alpha_h: SSH → thickness distribution (proportional to H_rest)
#   beta_vel: velocity initialisation [1.0, 1.0, 1.0]
#            (depth-uniform PGF → geostrophic balance requires equal velocities)
bc_file: ./data/hycom_bc_2024aug.nc
alpha_h: [0.6, 0.3, 0.1]
beta_vel: [1.0, 1.0, 1.0]
bc_n_ghost: 2

# Sponge / relaxation layer at open boundaries
# Exponential nudging zone BEYOND ghost cells to prevent wave reflections.
# Total affected zone = bc_n_ghost + sponge_width = 10 cells = 5° at 0.5°
sponge_width: 8             # cells beyond ghost zone
sponge_timescale: 3600.0    # e-folding relaxation timescale [s] (1 hour)

# Geostrophic velocity blending at initialization
# Blends HYCOM velocities with geostrophically-balanced velocities
# computed from SSH to ensure pressure-velocity consistency.
# 0 = pure HYCOM, 1 = pure geostrophic, 0.5 = 50/50 blend
geostrophic_blend: 0.5

# ---- Process noise ----
# sig_x_uv:  process noise for u,v (must be large enough for ensemble spread)
# sig_x_ssh: process noise for SSH
# sig_x_sst: process noise for SST
sig_x_uv: 0.15         # process noise std for u, v
sig_x_ssh: 0.15        # process noise std for SSH (reduced: 0.5 was inflating SSH)
sig_x_sst: 1.0         # process noise std for SST
# Noise decay per layer: surface gets full noise, deep layers minimal
# (deep layers are nearly unobserved; focusing noise on surface improves DA)
noise_decay: [1.0, 0.01, 0.01]

# ---- Observations ----
# Same drifter observations as SWE_LSMCMC (surface only)
# Obs map to layer 0 fields (surface u, v, SST)
drifter_source: 'osmc'
obs_time_start: '2024-08-01T00:00:00'
obs_time_end: '2024-08-12T00:00:00'

# Which fields to assimilate.  Options:
#   'uv'          — drifter velocity only
#   'uv_ssh'      — drifter velocity + SWOT SSH
#   'uv_sst'      — drifter velocity + drifter SST
#   'uv_ssh_sst'  — drifter velocity + SWOT SSH + drifter SST
#   'ssh'         — SWOT SSH only
#   'ssh_sst'     — SWOT SSH + drifter SST
assimilate_fields: 'uv_ssh_sst'

# Observation noise (estimated from data)
# sig_y_uv:  mean std of drifter velocity obs noise
# sig_y_sst: mean std of drifter SST obs noise
# sig_y_ssh: SWOT SSH obs noise (L3 error budget ≈ 5 cm)
sig_y_uv: 0.10
sig_y_sst: 0.40
sig_y_ssh: 0.25         # SWOT L3 accuracy ~5-10cm, trust SSH obs more

# ---- LSMCMC parameters ----
nforecast: 25
mcmc_N: 500
burn_in: 500
num_subdomains: 50

# ---- LETKF parameters ----
nanals: 50                   # ensemble size
hcovlocal_scale: 60          # localization scale [km] — best from K=50 sensitivity
covinflate1: 0.90            # RTPS relaxation coefficient — best from K=50 sensitivity

# ---- Output ----
lsmcmc_dir: ./output_lsmcmc_ldata_V1
letkf_dir: ./output_letkf_full240
data_dir: ./data

# ---- Observation file ----
# Drifter obs from SWE_LSMCMC (same domain, same drifters — 240 cycles available)
# SWOT SSH obs are merged in-memory at runtime when use_swot_ssh=True
obs_file: ./data/obs_2024aug/swe_drifter_obs.nc

# ---- SWOT SSH observations ----
# Add SWOT satellite SSH observations to constrain h_total (field 0).
# These are merged with existing drifter (u, v, T) observations.
use_swot_ssh: True
swot_source: 'real'         # 'synthetic' from HYCOM reference or 'real' from PO.DAAC
swot_dir: ./data/swot_2024aug_new
# sig_ssh is now sig_y_ssh above (obs noise section)
ssha_max: null              # no SWOT ssha outlier rejection
ssh_obs_fraction: 0.25      # fraction of cells observed per cycle (increased for better SSH coverage)
ssh_obs_seed: 42
